<!DOCTYPE html>
<html>
  <head>
    <title>HEARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        background: #0a0a0a;
        color: #f0f0f0;
        transition: background 0.6s ease, color 0.4s ease;
      }

      /* HEADER */
      header {
        display: flex;
        align-items: center;
        gap: 20px;
        padding: 24px 40px;
      }

      #back-btn {
        display: flex;
        align-items: center;
        gap: 6px;
        background: rgba(0,0,0,0.25);
        border: 1px solid rgba(255,255,255,0.15);
        color: inherit;
        padding: 8px 16px;
        border-radius: 3px;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        letter-spacing: 1px;
        text-transform: uppercase;
        transition: background 0.2s;
      }

      #back-btn:hover { background: rgba(0,0,0,0.4); }

      header a {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 28px;
        letter-spacing: 6px;
        color: inherit;
        text-decoration: none;
        opacity: 0.5;
      }

      /* LOADING */
      #loading-page {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        font-size: 13px;
        letter-spacing: 2px;
        opacity: 0.4;
      }

      /* NOT LOGGED IN */
      #not-logged-in {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        gap: 16px;
        font-size: 14px;
        opacity: 0.6;
      }

      #not-logged-in a {
        color: inherit;
        font-size: 13px;
        letter-spacing: 1px;
        border-bottom: 1px solid currentColor;
        padding-bottom: 2px;
        text-decoration: none;
      }

      /* ALBUM PAGE */
      #album-page {
        display: none;
        padding: 0 40px 60px;
        max-width: 860px;
      }

      /* HERO */
      .album-hero {
        display: flex;
        gap: 40px;
        margin-bottom: 52px;
        align-items: flex-end;
      }

      .album-hero img {
        width: 200px;
        height: 200px;
        object-fit: cover;
        border-radius: 6px;
        flex-shrink: 0;
        display: block;
        box-shadow: 0 12px 40px rgba(0,0,0,0.4);
      }

      .album-hero-info { flex: 1; padding-bottom: 4px; }

      .album-hero-info h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 52px;
        letter-spacing: 2px;
        line-height: 1;
        margin-bottom: 8px;
      }

      .hero-artist {
        font-size: 16px;
        opacity: 0.7;
        margin-bottom: 4px;
      }

      .hero-meta {
        font-size: 12px;
        opacity: 0.45;
        margin-bottom: 24px;
        letter-spacing: 1px;
      }

      /* STARS */
      .stars { display: flex; gap: 6px; margin-bottom: 16px; }

      .star {
        font-size: 26px;
        cursor: pointer;
        opacity: 0.25;
        transition: opacity 0.15s;
        line-height: 1;
      }

      .star.filled { opacity: 1; }

      /* THOUGHTS */
      #album-thoughts {
        width: 100%;
        max-width: 460px;
        height: 75px;
        background: rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.15);
        border-radius: 4px;
        color: inherit;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        padding: 10px 12px;
        resize: none;
        outline: none;
        transition: border-color 0.2s;
        display: block;
      }

      #album-thoughts:focus { border-color: rgba(255,255,255,0.4); }
      #album-thoughts::placeholder { opacity: 0.3; color: inherit; }

      /* DIVIDER */
      .divider {
        border: none;
        border-top: 1px solid rgba(255,255,255,0.12);
        margin-bottom: 32px;
      }

      /* TRACKS */
      .tracks-section h2 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 18px;
        letter-spacing: 4px;
        opacity: 0.35;
        margin-bottom: 8px;
      }

      .track-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 16px 0;
        border-bottom: 1px solid rgba(255,255,255,0.08);
      }

      .track-num {
        font-size: 12px;
        width: 24px;
        flex-shrink: 0;
        padding-top: 3px;
        text-align: right;
        opacity: 0.3;
      }

      .track-info { flex: 1; }

      .track-name {
        font-size: 14px;
        font-weight: 500;
        margin-bottom: 10px;
      }

      .track-textarea {
        width: 100%;
        max-width: 520px;
        height: 56px;
        background: rgba(0,0,0,0.2);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 4px;
        color: inherit;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        padding: 8px 12px;
        resize: none;
        outline: none;
        transition: border-color 0.2s;
        display: block;
      }

      .track-textarea:focus { border-color: rgba(255,255,255,0.35); }
      .track-textarea::placeholder { opacity: 0.3; color: inherit; }
    </style>
  </head>

  <body>
    <header>
      <button id="back-btn" onclick="history.back()">← Back</button>
      <a href="index.html">HEARD</a>
    </header>

    <div id="loading-page">Loading...</div>
    <div id="not-logged-in">
      <p>You need to be logged in to view this page.</p>
      <a href="index.html">Go to login →</a>
    </div>

    <div id="album-page">
      <div class="album-hero">
        <img id="cover" src="" alt="" crossorigin="anonymous" />
        <div class="album-hero-info">
          <h1 id="album-name"></h1>
          <div class="hero-artist" id="album-artist"></div>
          <div class="hero-meta" id="album-meta"></div>
          <div class="stars" id="album-stars"></div>
          <textarea id="album-thoughts" placeholder="Your thoughts on this album..."></textarea>
        </div>
      </div>

      <hr class="divider" />

      <div class="tracks-section">
        <h2>Tracks</h2>
        <div id="tracks-list"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
      const { createClient } = supabase;
      const sb = createClient(
        "https://jexqbnpxnikmdoiwnomf.supabase.co",
        "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpleHFibnB4bmlrbWRvaXdub21mIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzNzc3ODEsImV4cCI6MjA4Nzk1Mzc4MX0.ThdnnZ4yUrOP025ygVEuJxZSIQVmgtcjGi7-hO5s3NM"
      );

      let currentUser = null;
      let currentAlbum = null;
      let saveThoughtsTimer = null;
      const albumId = new URLSearchParams(window.location.search).get("id");

      // ── Session ──────────────────────────────────────────────────
      sb.auth.getSession().then(async ({ data: { session } }) => {
        if (session?.user) {
          currentUser = session.user;
          albumId ? await loadAlbumPage(albumId) : window.location.href = "index.html";
        } else {
          document.getElementById("loading-page").style.display = "none";
          document.getElementById("not-logged-in").style.display = "flex";
        }
      });

      sb.auth.onAuthStateChange(async (_event, session) => {
        if (_event === "INITIAL_SESSION") return;
        if (!session?.user) window.location.href = "index.html";
      });

      // ── Load Album ───────────────────────────────────────────────
      async function loadAlbumPage(id) {
        const [albumRes, tracksRes] = await Promise.all([
          fetch(`/api/album?id=${id}`),
          fetch(`/api/tracks?id=${id}`)
        ]);

        const albumData = await albumRes.json();
        const tracksData = await tracksRes.json();

        currentAlbum = {
          id,
          name: albumData.name,
          artist: albumData.artists?.[0]?.name || "",
          cover: albumData.images?.[0]?.url || "",
          release_date: albumData.release_date || "",
          genres: (albumData.genres || []).join(", ")
        };

        document.getElementById("cover").src = currentAlbum.cover;
        document.getElementById("album-name").textContent = currentAlbum.name;
        document.getElementById("album-artist").textContent = currentAlbum.artist;
        document.getElementById("album-meta").textContent =
          [currentAlbum.release_date, currentAlbum.genres].filter(Boolean).join(" · ");
        document.title = `${currentAlbum.name} — HEARD`;

        // Load saved data
        const { data: saved } = await sb
          .from("albums").select("rating, thoughts")
          .eq("id", id).eq("user_id", currentUser.id).single();

        renderStars(saved?.rating || 0);
        document.getElementById("album-thoughts").value = saved?.thoughts || "";

        const { data: savedReviews } = await sb
          .from("tracks").select("id, review")
          .eq("album_id", id).eq("user_id", currentUser.id);

        const reviewMap = {};
        (savedReviews || []).forEach(r => { reviewMap[r.id] = r.review; });

        // Render tracks
        const list = document.getElementById("tracks-list");
        (tracksData.items || []).forEach(track => {
          const item = document.createElement("div");
          item.className = "track-item";
          item.dataset.trackId = track.id;
          item.dataset.trackNum = track.track_number;
          item.dataset.trackName = track.name;
          item.innerHTML = `
            <div class="track-num">${track.track_number}</div>
            <div class="track-info">
              <div class="track-name">${track.name}</div>
              <textarea class="track-textarea" placeholder="Your thoughts...">${reviewMap[track.id] || ""}</textarea>
            </div>
          `;
          const textarea = item.querySelector("textarea");
          let t = null;
          textarea.addEventListener("input", () => {
            clearTimeout(t);
            t = setTimeout(() => sb.from("tracks").upsert({
              id: track.id, user_id: currentUser.id,
              album_id: currentAlbum.id, name: track.name,
              track_number: track.track_number, review: textarea.value
            }, { onConflict: "id,user_id" }), 800);
          });
          list.appendChild(item);
        });

        document.getElementById("loading-page").style.display = "none";
        document.getElementById("album-page").style.display = "block";

        // Autosave thoughts
        document.getElementById("album-thoughts").addEventListener("input", () => {
          clearTimeout(saveThoughtsTimer);
          saveThoughtsTimer = setTimeout(() => autoSaveAlbum(), 800);
        });

        // Extract colour from cover
        extractColour(currentAlbum.cover);
      }

      // ── Extract Dominant Colour ──────────────────────────────────
      function extractColour(imageUrl) {
        const img = new Image();
        img.crossOrigin = "anonymous";
        img.src = imageUrl;
        img.onload = () => {
          const canvas = document.createElement("canvas");
          canvas.width = 10;
          canvas.height = 10;
          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, 10, 10);
          const pixels = ctx.getImageData(0, 0, 10, 10).data;

          // Average the pixel colours
          let r = 0, g = 0, b = 0, count = 0;
          for (let i = 0; i < pixels.length; i += 4) {
            r += pixels[i];
            g += pixels[i + 1];
            b += pixels[i + 2];
            count++;
          }
          r = Math.floor(r / count);
          g = Math.floor(g / count);
          b = Math.floor(b / count);

          // Darken a bit so it's not too garish
          r = Math.floor(r * 0.55);
          g = Math.floor(g * 0.55);
          b = Math.floor(b * 0.55);

          // Decide text colour based on luminance
          const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
          const textColor = luminance > 0.45 ? "#111111" : "#f0f0f0";

          document.body.style.background = `rgb(${r},${g},${b})`;
          document.body.style.color = textColor;
        };

        // Fallback if CORS blocks it
        img.onerror = () => {
          document.body.style.background = "#0a0a0a";
          document.body.style.color = "#f0f0f0";
        };
      }

      // ── Stars ────────────────────────────────────────────────────
      function renderStars(selected) {
        const container = document.getElementById("album-stars");
        container.innerHTML = "";
        for (let i = 1; i <= 5; i++) {
          const star = document.createElement("span");
          star.className = "star" + (i <= selected ? " filled" : "");
          star.textContent = "★";
          star.addEventListener("click", () => {
            container.dataset.rating = i;
            highlightStars(i);
            autoSaveAlbum();
          });
          star.addEventListener("mouseover", () => highlightStars(i));
          star.addEventListener("mouseout", () => highlightStars(parseInt(container.dataset.rating || "0")));
          container.appendChild(star);
        }
        container.dataset.rating = selected;
      }

      function highlightStars(n) {
        document.querySelectorAll("#album-stars .star").forEach((s, i) => {
          s.classList.toggle("filled", i < n);
        });
      }

      // ── Auto Save ────────────────────────────────────────────────
      async function autoSaveAlbum() {
        if (!currentAlbum || !currentUser) return;
        const rating = parseInt(document.getElementById("album-stars").dataset.rating || "0");
        const thoughts = document.getElementById("album-thoughts").value.trim();
        if (!rating && !thoughts) return;
        await sb.from("albums").upsert({
          id: currentAlbum.id, user_id: currentUser.id,
          name: currentAlbum.name, artist: currentAlbum.artist,
          cover: currentAlbum.cover, release_date: currentAlbum.release_date,
          genres: currentAlbum.genres, rating, thoughts
        }, { onConflict: "id,user_id" });
      }
    </script>
  </body>
</html>
