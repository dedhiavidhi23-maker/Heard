<!DOCTYPE html>
<html>
  <head>
    <title>HEARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --border: #222;
        --accent: #e8ff47;
        --text: #f0f0f0;
        --muted: #555;
        --saved: #4ade80;
        --error: #ff5555;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* AUTH SCREEN */
      #auth-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 32px;
      }

      #auth-screen h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 80px;
        letter-spacing: 8px;
        color: var(--accent);
      }

      #auth-screen p.tagline {
        color: var(--muted);
        font-size: 14px;
        letter-spacing: 1px;
        margin-top: -20px;
      }

      .auth-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 32px;
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .auth-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }

      .auth-tab {
        padding: 10px 20px;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }

      .auth-tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .auth-form { display: flex; flex-direction: column; gap: 12px; }
      .auth-form.hidden { display: none; }

      .auth-input {
        width: 100%;
        padding: 12px 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }

      .auth-input:focus { border-color: var(--accent); }
      .auth-input::placeholder { color: var(--muted); }

      .auth-btn {
        padding: 12px;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 4px;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: opacity 0.2s;
        margin-top: 4px;
      }

      .auth-btn:hover { opacity: 0.85; }
      .auth-btn:disabled { opacity: 0.5; cursor: default; }

      .auth-error {
        font-size: 12px;
        color: var(--error);
        display: none;
      }

      .auth-error.show { display: block; }

      .password-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }

      .password-wrap .auth-input {
        padding-right: 56px;
      }

      .show-pw {
        position: absolute;
        right: 12px;
        font-size: 11px;
        letter-spacing: 1px;
        color: var(--muted);
        cursor: pointer;
        text-transform: uppercase;
        user-select: none;
        transition: color 0.2s;
      }

      .show-pw:hover { color: var(--accent); }

      /* MAIN APP */
      #app { display: none; }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 40px;
        border-bottom: 1px solid var(--border);
      }

      header h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        letter-spacing: 6px;
        color: var(--accent);
      }

      #user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        color: var(--muted);
      }

      #user-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        object-fit: cover;
        display: none;
        border: 1px solid var(--border);
      }

      #user-name { color: var(--text); font-size: 13px; }

      #logout-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 4px 10px;
        border-radius: 3px;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        transition: border-color 0.2s;
      }

      #logout-btn:hover { border-color: var(--muted); }

      nav {
        display: flex;
        padding: 0 40px;
        border-bottom: 1px solid var(--border);
      }

      .tab {
        padding: 16px 24px;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }

      .tab.active {
        color: var(--accent);
        border-bottom-color: var(--accent);
      }

      .panel { display: none; padding: 40px; }
      .panel.active { display: block; }

      #search {
        width: 100%;
        max-width: 500px;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 36px;
        display: block;
      }

      #search:focus { border-color: var(--accent); }
      #search::placeholder { color: var(--muted); }

      .album-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 24px;
      }

      .album-card { cursor: pointer; transition: transform 0.2s; }
      .album-card:hover { transform: translateY(-4px); }

      .album-card img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 4px;
        display: block;
      }

      .album-card .album-name {
        font-size: 13px;
        font-weight: 500;
        margin-top: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .album-card .album-artist {
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* TRACK PANEL */
      #track-panel {
        display: none;
        padding: 40px;
        border-top: 1px solid var(--border);
        background: var(--surface);
      }

      #track-panel.open { display: block; }

      #track-header {
        display: flex;
        gap: 28px;
        margin-bottom: 24px;
        align-items: flex-start;
      }

      #tp-cover {
        width: 160px;
        height: 160px;
        object-fit: cover;
        border-radius: 4px;
        flex-shrink: 0;
        display: block;
      }

      #track-meta h2 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 32px;
        letter-spacing: 2px;
        margin-bottom: 4px;
      }

      .meta-artist { color: var(--muted); font-size: 14px; margin-bottom: 6px; }
      .meta-details { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

      .stars { display: flex; gap: 4px; margin-bottom: 12px; }

      .star {
        font-size: 22px;
        cursor: pointer;
        color: var(--border);
        transition: color 0.15s;
        line-height: 1;
      }

      .star.filled { color: var(--accent); }

      textarea {
        width: 100%;
        max-width: 420px;
        height: 70px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        padding: 10px 12px;
        resize: none;
        outline: none;
        transition: border-color 0.2s;
        display: block;
      }

      textarea:focus { border-color: var(--accent); }
      textarea::placeholder { color: var(--muted); }

      #save-btn {
        display: block;
        margin: 0 0 32px 0;
        padding: 12px 36px;
        background: none;
        border: 1px solid var(--accent);
        color: var(--accent);
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.2s, color 0.2s;
      }

      #save-btn:hover:not(:disabled) { background: var(--accent); color: #000; }
      #save-btn:disabled { cursor: default; opacity: 0.6; }

      #tracks-list { margin-top: 32px; }

      .track-item {
        display: flex;
        align-items: flex-start;
        gap: 16px;
        padding: 16px 0;
        border-bottom: 1px solid var(--border);
      }

      .track-num {
        color: var(--muted);
        font-size: 12px;
        width: 20px;
        flex-shrink: 0;
        padding-top: 3px;
      }

      .track-info { flex: 1; }
      .track-name { font-size: 14px; font-weight: 500; margin-bottom: 8px; }

      /* LIBRARY */
      #library-empty { color: var(--muted); font-size: 14px; letter-spacing: 1px; }

      .library-card {
        display: flex;
        gap: 20px;
        padding: 20px;
        background: var(--surface);
        border-radius: 6px;
        margin-bottom: 16px;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: border-color 0.2s;
        align-items: center;
      }

      .library-card:hover { border-color: var(--muted); }

      .library-card img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 3px;
        flex-shrink: 0;
        display: block;
      }

      .library-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
      .library-artist { font-size: 13px; color: var(--muted); margin-bottom: 8px; }
      .library-stars .star { font-size: 15px; cursor: default; }
      .library-thoughts { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }

      .delete-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 16px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 3px;
        align-self: flex-start;
        flex-shrink: 0;
        transition: color 0.2s;
        line-height: 1;
        margin-left: auto;
      }

      .delete-btn:hover { color: var(--error); }

      /* PROFILE */
      .profile-section {
        max-width: 500px;
      }

      .profile-section h2 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 24px;
        letter-spacing: 3px;
        margin-bottom: 24px;
        color: var(--accent);
      }

      .profile-avatar-wrap {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 28px;
      }

      #profile-avatar-preview {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--border);
        display: block;
        background: var(--surface);
      }

      .profile-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 18px;
      }

      .profile-field label {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .profile-input {
        width: 100%;
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }

      .profile-input:focus { border-color: var(--accent); }
      .profile-input::placeholder { color: var(--muted); }

      #profile-save-btn {
        padding: 12px 36px;
        background: none;
        border: 1px solid var(--accent);
        color: var(--accent);
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 3px;
        transition: background 0.2s, color 0.2s;
        margin-top: 8px;
      }

      #profile-save-btn:hover { background: var(--accent); color: #000; }

      .profile-saved {
        font-size: 12px;
        color: var(--saved);
        margin-left: 12px;
        opacity: 0;
        transition: opacity 0.3s;
      }

      .profile-saved.show { opacity: 1; }

      #loading { display: none; color: var(--muted); font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; }
    </style>
  </head>

  <body>

    <!-- INITIAL LOADING -->
    <div id="init-loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#555;font-size:13px;letter-spacing:2px;">Loading...</div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" style="display:none">
      <h1>HEARD</h1>
      <p class="tagline">your music, your thoughts</p>

      <div class="auth-box">
        <div class="auth-tabs">
          <div class="auth-tab active" data-auth="login">Log In</div>
          <div class="auth-tab" data-auth="signup">Sign Up</div>
        </div>

        <!-- LOGIN FORM -->
        <div class="auth-form" id="login-form">
          <input class="auth-input" id="login-email" type="email" placeholder="Email" />
          <div class="password-wrap">
            <input class="auth-input" id="login-password" type="password" placeholder="Password" />
            <span class="show-pw" onclick="togglePw('login-password', this)">Show</span>
          </div>
          <span class="auth-error" id="login-error"></span>
          <button class="auth-btn" id="login-btn">Log In</button>
        </div>

        <!-- SIGNUP FORM -->
        <div class="auth-form hidden" id="signup-form">
          <input class="auth-input" id="signup-email" type="email" placeholder="Email" />
          <div class="password-wrap">
            <input class="auth-input" id="signup-password" type="password" placeholder="Password (min 6 characters)" />
            <span class="show-pw" onclick="togglePw('signup-password', this)">Show</span>
          </div>
          <input class="auth-input" id="signup-username" type="text" placeholder="Username (shown to others)" />
          <span class="auth-error" id="signup-error"></span>
          <button class="auth-btn" id="signup-btn">Create Account</button>
        </div>
      </div>
    </div>

    <!-- MAIN APP -->
    <div id="app">
      <header>
        <h1>HEARD</h1>
        <div id="user-info">
          <img id="user-avatar" src="" alt="" />
          <span id="user-name"></span>
          <button id="logout-btn">Log out</button>
        </div>
      </header>

      <nav>
        <div class="tab active" data-tab="search">Search</div>
        <div class="tab" data-tab="library">My Library</div>
        <div class="tab" data-tab="profile">Profile</div>
      </nav>

      <!-- SEARCH PANEL -->
      <div class="panel active" id="search-panel">
        <input id="search" placeholder="Search for an album..." />
        <div id="loading">Searching...</div>
        <div id="results" class="album-grid"></div>
      </div>

      <!-- LIBRARY PANEL -->
      <div class="panel" id="library-panel">
        <div id="library-content"></div>
      </div>

      <!-- PROFILE PANEL -->
      <div class="panel" id="profile-panel">
        <div class="profile-section">
          <h2>Your Profile</h2>

          <div class="profile-avatar-wrap">
            <img id="profile-avatar-preview" src="" alt="avatar" />
            <div class="profile-field" style="flex:1; margin-bottom:0">
              <label>Profile Picture URL</label>
              <input class="profile-input" id="profile-avatar-url" type="text" placeholder="Paste an image URL..." />
            </div>
          </div>

          <div class="profile-field">
            <label>Username</label>
            <input class="profile-input" id="profile-username" type="text" placeholder="Your username" />
          </div>

          <div class="profile-field">
            <label>Bio</label>
            <input class="profile-input" id="profile-bio" type="text" placeholder="Say something about yourself..." />
          </div>

          <div class="profile-field">
            <label>Favourite Genres</label>
            <input class="profile-input" id="profile-genres" type="text" placeholder="e.g. Pop, Indie, Hip-Hop..." />
          </div>

          <div style="display:flex; align-items:center">
            <button id="profile-save-btn" onclick="saveProfile()">Save Profile</button>
            <span class="profile-saved" id="profile-saved">Saved ✓</span>
          </div>
        </div>
      </div>

      <!-- TRACK PANEL -->
      <div id="track-panel">
        <div id="track-header">
          <img id="tp-cover" src="" alt="" />
          <div id="track-meta">
            <h2 id="tp-name"></h2>
            <div class="meta-artist" id="tp-artist"></div>
            <div class="meta-details" id="tp-details"></div>
            <div class="stars" id="album-stars"></div>
            <textarea id="album-thoughts" placeholder="Your thoughts on this album..."></textarea>
          </div>
        </div>
        <button id="save-btn" onclick="saveAll()">Save Everything</button>
        <div id="tracks-list"></div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
