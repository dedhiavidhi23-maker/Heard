<!DOCTYPE html>
<html>
  <head>
    <title>HEARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
      :root {
        --bg: #0a0a0a;
        --surface: #141414;
        --border: #222;
        --accent: #e8ff47;
        --text: #f0f0f0;
        --muted: #555;
        --saved: #4ade80;
        --error: #ff5555;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: 'DM Sans', sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
      }

      /* AUTH SCREEN */
      #auth-screen {
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        gap: 32px;
      }

      #auth-screen h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 80px;
        letter-spacing: 8px;
        color: var(--accent);
      }

      #auth-screen p.tagline {
        color: var(--muted);
        font-size: 14px;
        letter-spacing: 1px;
        margin-top: -20px;
      }

      .auth-box {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 32px;
        width: 100%;
        max-width: 360px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .auth-tabs {
        display: flex;
        border-bottom: 1px solid var(--border);
        margin-bottom: 8px;
      }

      .auth-tab {
        padding: 10px 20px;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }

      .auth-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

      .auth-form { display: flex; flex-direction: column; gap: 12px; }
      .auth-form.hidden { display: none; }

      .auth-input {
        width: 100%;
        padding: 12px 14px;
        background: var(--bg);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }

      .auth-input:focus { border-color: var(--accent); }
      .auth-input::placeholder { color: var(--muted); }

      .auth-btn {
        padding: 12px;
        background: var(--accent);
        color: #000;
        border: none;
        border-radius: 4px;
        font-family: 'DM Sans', sans-serif;
        font-size: 13px;
        font-weight: 500;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        transition: opacity 0.2s;
        margin-top: 4px;
      }

      .auth-btn:hover { opacity: 0.85; }
      .auth-btn:disabled { opacity: 0.5; cursor: default; }

      .auth-error { font-size: 12px; color: var(--error); display: none; }
      .auth-error.show { display: block; }

      .password-wrap { position: relative; display: flex; align-items: center; }
      .password-wrap .auth-input { padding-right: 56px; }

      .show-pw {
        position: absolute;
        right: 12px;
        font-size: 11px;
        letter-spacing: 1px;
        color: var(--muted);
        cursor: pointer;
        text-transform: uppercase;
        user-select: none;
        transition: color 0.2s;
      }

      .show-pw:hover { color: var(--accent); }

      /* MAIN APP */
      #app { display: none; }

      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 24px 40px;
        border-bottom: 1px solid var(--border);
      }

      header h1 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        letter-spacing: 6px;
        color: var(--accent);
      }

      #user-info {
        display: flex;
        align-items: center;
        gap: 12px;
        font-size: 13px;
        color: var(--muted);
      }

      #user-avatar {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        object-fit: cover;
        display: none;
        border: 1px solid var(--border);
      }

      #user-name { color: var(--text); font-size: 13px; }

      #logout-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 4px 10px;
        border-radius: 3px;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        transition: border-color 0.2s;
      }

      #logout-btn:hover { border-color: var(--muted); }

      nav {
        display: flex;
        padding: 0 40px;
        border-bottom: 1px solid var(--border);
      }

      .tab {
        padding: 16px 24px;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        color: var(--muted);
        border-bottom: 2px solid transparent;
        transition: all 0.2s;
      }

      .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

      .panel { display: none; padding: 40px; }
      .panel.active { display: block; }

      /* SEARCH */
      #search {
        width: 100%;
        max-width: 500px;
        padding: 14px 18px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 15px;
        outline: none;
        transition: border-color 0.2s;
        margin-bottom: 36px;
        display: block;
      }

      #search:focus { border-color: var(--accent); }
      #search::placeholder { color: var(--muted); }

      .album-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 24px;
      }

      .album-card { cursor: pointer; transition: transform 0.2s; }
      .album-card:hover { transform: translateY(-4px); }

      .album-card img {
        width: 100%;
        aspect-ratio: 1;
        object-fit: cover;
        border-radius: 4px;
        display: block;
      }

      .album-card .album-name {
        font-size: 13px;
        font-weight: 500;
        margin-top: 10px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .album-card .album-artist {
        font-size: 12px;
        color: var(--muted);
        margin-top: 3px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      /* LIBRARY */
      .library-card {
        display: flex;
        gap: 20px;
        padding: 20px;
        background: var(--surface);
        border-radius: 6px;
        margin-bottom: 16px;
        cursor: pointer;
        border: 1px solid var(--border);
        transition: border-color 0.2s;
        align-items: center;
      }

      .library-card:hover { border-color: var(--muted); }

      .library-card img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 3px;
        flex-shrink: 0;
        display: block;
      }

      .library-name { font-size: 15px; font-weight: 500; margin-bottom: 3px; }
      .library-artist { font-size: 13px; color: var(--muted); margin-bottom: 8px; }

      .star {
        font-size: 15px;
        cursor: default;
        color: var(--border);
        line-height: 1;
      }

      .star.filled { color: var(--accent); }
      .library-thoughts { font-size: 12px; color: var(--muted); margin-top: 6px; font-style: italic; }

      .delete-btn {
        background: none;
        border: none;
        color: var(--muted);
        font-size: 16px;
        cursor: pointer;
        padding: 4px 8px;
        border-radius: 3px;
        flex-shrink: 0;
        transition: color 0.2s;
        line-height: 1;
        margin-left: auto;
      }

      .delete-btn:hover { color: var(--error); }

      /* PROFILE — VIEW MODE */
      #profile-view { display: block; }
      #profile-edit { display: none; }

      .profile-view-wrap {
        display: flex;
        gap: 32px;
        align-items: flex-start;
        margin-bottom: 40px;
      }

      #profile-view-avatar {
        width: 100px;
        height: 100px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--border);
        display: block;
        flex-shrink: 0;
        background: var(--surface);
      }

      .profile-view-info h2 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 36px;
        letter-spacing: 3px;
        margin-bottom: 6px;
      }

      .profile-view-bio {
        font-size: 14px;
        color: var(--muted);
        margin-bottom: 8px;
      }

      .profile-view-genres {
        font-size: 12px;
        color: var(--accent);
        letter-spacing: 1px;
        margin-bottom: 20px;
      }

      .profile-stats {
        display: flex;
        gap: 32px;
        margin-bottom: 28px;
      }

      .stat { text-align: center; }

      .stat-num {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 32px;
        letter-spacing: 2px;
        color: var(--accent);
        line-height: 1;
      }

      .stat-label {
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-top: 4px;
      }

      .edit-profile-btn {
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        padding: 8px 20px;
        border-radius: 3px;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: border-color 0.2s, color 0.2s;
      }

      .edit-profile-btn:hover { border-color: var(--accent); color: var(--accent); }

      /* PROFILE — EDIT MODE */
      .profile-edit-wrap { max-width: 460px; }

      .profile-edit-wrap h2 {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 24px;
        letter-spacing: 3px;
        color: var(--accent);
        margin-bottom: 24px;
      }

      .profile-avatar-row {
        display: flex;
        align-items: center;
        gap: 20px;
        margin-bottom: 24px;
      }

      #profile-avatar-preview {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--border);
        display: block;
        background: var(--surface);
        flex-shrink: 0;
      }

      .profile-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }

      .profile-field label {
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        color: var(--muted);
      }

      .profile-input {
        width: 100%;
        padding: 12px 14px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--text);
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        outline: none;
        transition: border-color 0.2s;
      }

      .profile-input:focus { border-color: var(--accent); }
      .profile-input::placeholder { color: var(--muted); }

      .profile-edit-actions {
        display: flex;
        gap: 12px;
        align-items: center;
        margin-top: 8px;
      }

      #profile-save-btn {
        padding: 10px 28px;
        background: var(--accent);
        color: #000;
        border: none;
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 3px;
        transition: opacity 0.2s;
      }

      #profile-save-btn:hover { opacity: 0.85; }

      #profile-cancel-btn {
        padding: 10px 20px;
        background: none;
        border: 1px solid var(--border);
        color: var(--muted);
        font-family: 'DM Sans', sans-serif;
        font-size: 12px;
        letter-spacing: 2px;
        text-transform: uppercase;
        cursor: pointer;
        border-radius: 3px;
        transition: border-color 0.2s;
      }

      #profile-cancel-btn:hover { border-color: var(--muted); }

      .profile-saved {
        font-size: 12px;
        color: var(--saved);
        opacity: 0;
        transition: opacity 0.3s;
      }

      .profile-saved.show { opacity: 1; }

      #loading { display: none; color: var(--muted); font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; }
    </style>
  </head>

  <body>

    <!-- INITIAL LOADING -->
    <div id="init-loading" style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#555;font-size:13px;letter-spacing:2px;">Loading...</div>

    <!-- AUTH SCREEN -->
    <div id="auth-screen">
      <h1>HEARD</h1>
      <p class="tagline">your music, your thoughts</p>

      <div class="auth-box">
        <div class="auth-tabs">
          <div class="auth-tab active" data-auth="login">Log In</div>
          <div class="auth-tab" data-auth="signup">Sign Up</div>
        </div>

        <div class="auth-form" id="login-form">
          <input class="auth-input" id="login-username" type="text" placeholder="Username" />
          <div class="password-wrap">
            <input class="auth-input" id="login-password" type="password" placeholder="Password" />
            <span class="show-pw" onclick="togglePw('login-password', this)">Show</span>
          </div>
          <span class="auth-error" id="login-error"></span>
          <button class="auth-btn" id="login-btn">Log In</button>
        </div>

        <div class="auth-form hidden" id="signup-form">
          <input class="auth-input" id="signup-email" type="email" placeholder="Email" />
          <div class="password-wrap">
            <input class="auth-input" id="signup-password" type="password" placeholder="Password (min 6 characters)" />
            <span class="show-pw" onclick="togglePw('signup-password', this)">Show</span>
          </div>
          <input class="auth-input" id="signup-username" type="text" placeholder="Username" />
          <span class="auth-error" id="signup-error"></span>
          <button class="auth-btn" id="signup-btn">Create Account</button>
        </div>
      </div>
    </div>

    <!-- MAIN APP -->
    <div id="app">
      <header>
        <h1>HEARD</h1>
        <div id="user-info">
          <img id="user-avatar" src="" alt="" />
          <span id="user-name"></span>
          <button id="logout-btn">Log out</button>
        </div>
      </header>

      <nav>
        <div class="tab active" data-tab="search">Search</div>
        <div class="tab" data-tab="library">My Library</div>
        <div class="tab" data-tab="profile">Profile</div>
      </nav>

      <!-- SEARCH PANEL -->
      <div class="panel active" id="search-panel">
        <input id="search" placeholder="Search for an album..." />
        <div id="loading">Searching...</div>
        <div id="results" class="album-grid"></div>
      </div>

      <!-- LIBRARY PANEL -->
      <div class="panel" id="library-panel">
        <div id="library-content"></div>
      </div>

      <!-- PROFILE PANEL -->
      <div class="panel" id="profile-panel">

        <!-- VIEW MODE -->
        <div id="profile-view">
          <div class="profile-view-wrap">
            <img id="profile-view-avatar" src="" alt="" />
            <div class="profile-view-info">
              <h2 id="profile-view-username">—</h2>
              <div class="profile-view-bio" id="profile-view-bio"></div>
              <div class="profile-view-genres" id="profile-view-genres"></div>
              <div class="profile-stats">
                <div class="stat">
                  <div class="stat-num" id="stat-albums">0</div>
                  <div class="stat-label">Albums</div>
                </div>
                <div class="stat">
                  <div class="stat-num" id="stat-reviews">0</div>
                  <div class="stat-label">Reviews</div>
                </div>
              </div>
              <button class="edit-profile-btn" onclick="showEditProfile()">Edit Profile</button>
            </div>
          </div>
        </div>

        <!-- EDIT MODE -->
        <div id="profile-edit">
          <div class="profile-edit-wrap">
            <h2>Edit Profile</h2>

            <div class="profile-avatar-row">
              <img id="profile-avatar-preview" src="" alt="" />
              <div class="profile-field" style="flex:1;margin-bottom:0">
                <label>Profile Picture URL</label>
                <input class="profile-input" id="profile-avatar-url" type="text" placeholder="Paste an image URL..." />
              </div>
            </div>

            <div class="profile-field">
              <label>Username</label>
              <input class="profile-input" id="profile-username" type="text" placeholder="Your username" />
            </div>

            <div class="profile-field">
              <label>Bio</label>
              <input class="profile-input" id="profile-bio" type="text" placeholder="Say something about yourself..." />
            </div>

            <div class="profile-field">
              <label>Favourite Genres</label>
              <input class="profile-input" id="profile-genres" type="text" placeholder="e.g. Pop, Indie, Hip-Hop..." />
            </div>

            <div class="profile-edit-actions">
              <button id="profile-save-btn" onclick="saveProfile()">Save</button>
              <button id="profile-cancel-btn" onclick="showViewProfile()">Cancel</button>
              <span class="profile-saved" id="profile-saved">Saved ✓</span>
            </div>
          </div>
        </div>

      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="app.js"></script>
  </body>
</html>
